<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/iconeNavegador.png" type="image/png">
    <title>Cadastro</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="cadastro-container">

        <div class="cadastro-card">

            <div class="cadastro-header">
                <h1>Criar Conta</h1>
                <p>Cadastre-se para agendar serviços</p>
            </div>

            <form id="formCadastro" class="cadastro-form">

                <div class="input-group">
                    <label for="inputNomeUsuario">Nome Completo</label>
                    <input
                        type="text"
                        id="inputNomeUsuario"
                        placeholder="Digite seu nome"
                        required>
                </div>

                <div class="input-group">
                    <label for="inputEmailUsuario">E-mail</label>
                    <input
                        type="email"
                        id="inputEmailUsuario"
                        placeholder="Digite seu e-mail"
                        required>
                </div>

                <div class="input-group">
                    <label for="inputTelefoneUsuario">Telefone</label>
                    <input
                        type="tel"
                        id="inputTelefoneUsuario"
                        placeholder="(11) 99999-9999"
                        required>
                </div>

                <div class="input-group">
                    <label for="inputSenhaUsuario">Senha</label>

                    <input
                        type="password"
                        id="inputSenhaUsuario"
                        placeholder="Digite sua senha"
                        required>
                </div>

                <div class="input-group">
                    <label for="inputConfirmarSenha">Confirmar Senha</label>

                    <input
                        type="password"
                        id="inputConfirmarSenha"
                        placeholder="Repita sua senha"
                        required>
                </div>

                <button type="submit" id="btnCadastrarUsuario">
                    Criar Conta
                </button>

            </form>

            <div class="cadastro-links">
                <p>
                    Já possui uma conta?
                    <a href="login.html">Entrar</a>
                </p>
            </div>

            <a href="../index.html#inicio" class="btn-voltar">
                ← Voltar ao site
            </a>

        </div>

    </div>

    <div id="modalCadastroSucesso" class="modal">

        <div class="modal-content modal-sucesso">

            <h2>🎉 Conta criada com sucesso!</h2>

            <p>
                Redirecionando para o login...
            </p>

        </div>

    </div>

    <script type="module" src="../js/cadastro.js"></script>
</body>

</html>
